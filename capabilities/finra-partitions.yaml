naftiko: 1.0.0-alpha2
info:
  label: FINRA Query API — Partitions
  description: 'FINRA Query API — Partitions. 1 operations. Lead operation: Get available partition values for a dataset.
    Self-contained Naftiko capability covering one Finra business surface.'
  tags:
  - Finra
  - Partitions
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FINRA_API_KEY: FINRA_API_KEY
capability:
  consumes:
  - type: http
    namespace: finra-partitions
    baseUri: https://api.finra.org
    description: FINRA Query API — Partitions business capability. Self-contained, no shared references.
    resources:
    - name: partitions-group-group-name-dataset
      path: /partitions/group/{group}/name/{dataset}
      operations:
      - name: getdatasetpartitions
        method: GET
        description: Get available partition values for a dataset
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.FINRA_API_KEY}}'
  exposes:
  - type: rest
    namespace: finra-partitions-rest
    port: 8080
    description: REST adapter for FINRA Query API — Partitions. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/partitions/group/{group}/name/{dataset}
      name: partitions-group-group-name-dataset
      description: REST surface for partitions-group-group-name-dataset.
      operations:
      - method: GET
        name: getdatasetpartitions
        description: Get available partition values for a dataset
        call: finra-partitions.getdatasetpartitions
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: finra-partitions-mcp
    port: 9090
    transport: http
    description: MCP adapter for FINRA Query API — Partitions. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: get-available-partition-values-dataset
      description: Get available partition values for a dataset
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: finra-partitions.getdatasetpartitions
      outputParameters:
      - type: object
        mapping: $.
