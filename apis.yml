aid: finra
name: FINRA
description: >-
  The Financial Industry Regulatory Authority (FINRA) is a regulatory organization that oversees and regulates the
  securities industry in the United States. The FINRA Developer Center exposes Query, Notification, and Submission APIs
  for accessing market and regulatory datasets, detecting changes via polling, and submitting filings to FINRA.
type: Index
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
access: 3rd-Party
created: '2025-03-01'
modified: '2026-05-19'
position: Consumer
tags:
  - Compliance
  - Financial
  - Regulations
  - Securities
  - Market Data
url: https://raw.githubusercontent.com/api-evangelist/finra/refs/heads/main/apis.yml
specificationVersion: '0.19'
apis:
  - aid: finra:query-api
    name: FINRA Query API
    description: >-
      The Query API provides programmatic access to FINRA datasets, including market data, regulatory data, and
      reference data via a standard query interface.
    humanURL: https://developer.finra.org/docs#query_api
    tags:
      - Compliance
      - Financial
      - Market Data
      - Query
      - Regulations
    properties:
      - type: Documentation
        url: https://developer.finra.org/docs#query_api
      - type: DeveloperPortal
        url: https://developer.finra.org/
      - url: openapi/finra-openapi.yml
        type: OpenAPI
  - aid: finra:notification-api
    name: FINRA Notification API
    description: >-
      The Notification API allows third-party systems to detect changes related to FINRA datasets and resources via
      polling, enabling event-driven integrations with FINRA reference and market data.
    humanURL: https://developer.finra.org/docs#notification_api
    tags:
      - Compliance
      - Notifications
      - Polling
      - Regulations
    properties:
      - type: Documentation
        url: https://developer.finra.org/docs#notification_api
      - type: DeveloperPortal
        url: https://developer.finra.org/
  - aid: finra:submission-api
    name: FINRA Submission API
    description: >-
      The Submission API allows third-party systems to submit filings and other regulatory data to FINRA via a standard
      submission interface.
    humanURL: https://developer.finra.org/docs#submission_api
    tags:
      - Compliance
      - Filings
      - Regulations
      - Submissions
    properties:
      - type: Documentation
        url: https://developer.finra.org/docs#submission_api
      - type: DeveloperPortal
        url: https://developer.finra.org/
